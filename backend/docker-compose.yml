services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: echoswarm
      POSTGRES_USER: echoswarm
      POSTGRES_PASSWORD: echoswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoswarm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
